{% extends "base.html" %}
{% block title %}Xato — IDROK.AI Admin{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center">
  <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mb-4">
    <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
    </svg>
  </div>
  <h1 class="text-2xl font-bold text-gray-900 mb-2">Xato yuz berdi</h1>
  {% if error %}
  <p class="text-gray-500 mb-6 max-w-md">{{ error }}</p>
  {% else %}
  <p class="text-gray-500 mb-6">Kutilmagan xato yuz berdi. Iltimos, qayta urinib ko'ring.</p>
  {% endif %}
  <div class="flex items-center gap-3">
    <button onclick="history.back()" class="btn-secondary">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
      </svg>
      Ortga qaytish
    </button>
    <a href="/" class="btn-primary">Dashboard</a>
  </div>
</div>
{% endblock %}
